[theme]
primaryColor = "#0066cc"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = true
maxUploadSize = 200

[server]
port = 8501
headless = true
runOnSave = true
addressable = true
logLevel = "debug"
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[logger]
level = "debug"
